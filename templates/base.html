<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VentasRF — 1ro de Mayo{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="brand-icon">🫕</span>
      <span class="brand-text">VentasRF</span>
      <span class="brand-date">1ro de Mayo</span>
    </div>
    <div class="navbar-links">
      <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
        Dashboard
      </a>
      <a href="/nuevo-pedido" class="nav-link btn-primary {% if request.path == '/nuevo-pedido' %}active{% endif %}">
        + Nuevo Pedido
      </a>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer con precios -->
  <footer class="footer">
    <span id="footer-precios">Cargando precios…</span>
  </footer>

  <script>
    // Carga los precios en el footer una sola vez
    fetch('/api/precios').then(r => r.json()).then(p => {
      document.getElementById('footer-precios').textContent =
        `Locro: $${p.locro_unitario.toLocaleString('es-AR')} | Combo 2 locros: $${p.locro_combo.toLocaleString('es-AR')} | Pastelitos: $${p.pastelito_media_docena.toLocaleString('es-AR')} cada 6 ud`;
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
