services:
  - type: web
    name: ventasRF
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ventasRF-db
          property: connectionString

databases:
  - name: ventasRF-db
    plan: free
